<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription – Timlilit</title>
    <link rel="stylesheet" href="app.css">
    <script defer src="form-validation.js"></script>
</head>
<body>

<header>
    <img src="logo.jpg" class="logo" alt="Logo">
    <nav>
        <ul>
            <li><a href="index.html">Accueil</a></li>
            <li><a href="register.html">Inscription</a></li>
            <li><a href="products.html">Produits</a></li>
        </ul>
    </nav>
</header>

<h2 class="page-title">Formulaire d'inscription</h2>

<form id="registerForm">

    <label>Nom *</label>
    <input type="text" id="nom" required>

    <label>Prénom *</label>
    <input type="text" id="prenom" required>

    <label>Email *</label>
    <input type="email" id="email" required>

    <label>Numéro de téléphone</label>
    <input type="text" id="tel">

    <label>Date de naissance</label>
    <input type="date" id="dateN">

    <label>Nom d'utilisateur *</label>
    <input type="text" id="username" required>

    <label>Mot de passe *</label>
    <input type="password" id="password" required>

    <label>Confirmer le mot de passe *</label>
    <input type="password" id="confirmPassword" required>

       <label>Préférences :</label>
    <div class="checkbox-group">
        <div class="checkbox-line">
            <input type="checkbox" id="newsletter">
            <label for="newsletter" style="font-weight: normal;">Newsletter</label>
        </div>
        <div class="checkbox-line">
            <input type="checkbox" id="promo">
            <label for="promo" style="font-weight: normal;">Offres promotionnelles</label>
        </div>
    </div>

    <label>Genre :</label>
    <div class="radio-group">
        <div class="radio-line">
            <input type="radio" name="genre" value="Homme" id="homme">
            <label for="homme" style="font-weight: normal;">Homme</label>
        </div>
        <div class="radio-line">
            <input type="radio" name="genre" value="Femme" id="femme">
            <label for="femme" style="font-weight: normal;">Femme</label>
        </div>
    </div>

    <label>Pays :</label>
    <select id="pays">
        <option value="">Choisir...</option>
        <option value="TN">Tunisie</option>
        <option value="DZ">Algérie</option>
        <option value="MA">Maroc</option>
    </select>

    <label>
        <input type="checkbox" id="acceptCGV" required>
        J'accepte les conditions générales *
    </label>

    <button type="submit">S'inscrire</button>
    <button type="reset">Réinitialiser</button>

</form>

<div id="message"></div>

</body>
</html>
